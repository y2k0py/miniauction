{% extends "base.html" %}

{% block title %}Rejestracja — MiniAukcje{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header"><h1 class="h4 mb-0">Rejestracja</h1></div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            {{ field.label_tag }}
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger small">{{ field.errors }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary w-100">Załóż konto</button>
                </form>
                <p class="mt-3 mb-0 text-center">Masz konto? <a href="{% url 'accounts:login' %}">Zaloguj się</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
