{% extends "base.html" %}

{% block title %}Logowanie — MiniAukcje{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-header"><h1 class="h4 mb-0">Logowanie</h1></div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {% if form.non_field_errors %}
                        <div class="text-danger small mb-2">{{ form.non_field_errors }}</div>
                    {% endif %}
                    <div class="mb-3">
                        <label for="id_username">Nazwa użytkownika</label>
                        <input type="text" name="username" class="form-control" id="id_username" required>
                    </div>
                    <div class="mb-3">
                        <label for="id_password">Hasło</label>
                        <input type="password" name="password" class="form-control" id="id_password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Zaloguj</button>
                </form>
                <p class="mt-3 mb-0 text-center">Nie masz konta? <a href="{% url 'accounts:register' %}">Zarejestruj się</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
