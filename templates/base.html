<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MiniAukcje{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'auctions:list' %}">MiniAukcje</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link text-white" href="{% url 'auctions:list' %}">Aukcje</a>
                {% if user.is_authenticated %}
                    <a class="nav-link text-white" href="{% url 'auctions:create' %}">Dodaj aukcję</a>
                    <a class="nav-link text-white" href="{% url 'accounts:profile' %}">Profil</a>
                    <form method="post" action="{% url 'accounts:logout' %}" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="nav-link text-white btn btn-link border-0">Wyloguj</button>
                    </form>
                {% else %}
                    <a class="nav-link text-white" href="{% url 'accounts:login' %}">Logowanie</a>
                    <a class="nav-link text-white" href="{% url 'accounts:register' %}">Rejestracja</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container pb-5">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
